<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <title>Íris · Naturatins</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  </style>
</head>
<body>
  <div id="root" style="height:100%;"></div>

  <script>
    // Configuração da gaveta JSONBin desta Íris (já preenchida)
    window.IRIS = {
      KEY: "$2a$10$MwiS5r7XaW0X0fbFHjMn5Pup1dB.pm6pNQMtO4PyNHRPZKH1GX1bNw",
      BIN: "6a301d16f5f4af5e29f5f64b"
    };
  </script>

  <script>
    var e = React.createElement;
    var useState = React.useState, useEffect = React.useEffect, useCallback = React.useCallback;
    var C = window.IRIS;
    function ready() { return C.KEY !== "SEU_MASTER_KEY_AQUI" && C.BIN !== "SEU_BIN_ID_AQUI"; }

    var API = {
      load: function() {
        return fetch("https://api.jsonbin.io/v3/b/" + C.BIN + "/latest", {
          headers: { "X-Master-Key": C.KEY, "X-Bin-Meta": "false" }
        }).then(function(r) {
          if (!r.ok) throw new Error("Erro ao carregar");
          return r.json();
        }).then(function(d) {
          return Array.isArray(d.record && d.record.tasks) ? d.record.tasks : [];
        });
      },
      save: function(tasks) {
        return fetch("https://api.jsonbin.io/v3/b/" + C.BIN, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "X-Master-Key": C.KEY },
          body: JSON.stringify({ tasks: tasks })
        });
      }
    };

    var COMPLEXITY = [
      { label: "Card/Banner (layout pronto)",        hours: 1, emoji: "⚡" },
      { label: "Criação com referência",             hours: 2, emoji: "🎨" },
      { label: "Do zero (sem referência)",           hours: 3, emoji: "✏️" },
      { label: "Campanha completa",                  hours: 5, emoji: "📢" },
      { label: "Projeto complexo (vídeo / peça grande)", hours: 8, emoji: "🎬" }
    ];
    var CATS = ["Card/Post","Banner","Impresso","Relatório","Apresentação","Campanha Ambiental","Outro"];
    var W0 = 8, WH = 6;
    var G = "#1C5C3C", SAGE = "#EAF3EC", AMB = "#C88A1A",
        BG = "#F6F9F6", W = "#FFFFFF", RED = "#C94B4B", GRN = "#3A8A58";

    function addH(from, h) {
      var t = new Date(from), r = h;
      while (r > 0) {
        while (t.getDay() === 0 || t.getDay() === 6) { t.setDate(t.getDate()+1); t.setHours(W0,0,0,0); }
        if (t.getHours() < W0) t.setHours(W0,0,0,0);
        var end = W0 + WH;
        if (t.getHours() >= end) { t.setDate(t.getDate()+1); t.setHours(W0,0,0,0); continue; }
        var left = end - t.getHours() - t.getMinutes()/60;
        if (r <= left) { t.setTime(t.getTime() + r*3600000); r = 0; }
        else { r -= left; t.setDate(t.getDate()+1); t.setHours(W0,0,0,0); }
      }
      return t;
    }

    function fmt(d) {
      var now = new Date(), tod = new Date(now.getFullYear(),now.getMonth(),now.getDate());
      var tmr = new Date(tod); tmr.setDate(tmr.getDate()+1);
      var day = new Date(d.getFullYear(),d.getMonth(),d.getDate());
      var hm = d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
      if (day.getTime()===tod.getTime()) return "Hoje " + hm;
      if (day.getTime()===tmr.getTime()) return "Amanhã " + hm;
      var dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
      return dias[d.getDay()] + " " + d.getDate() + "/" + (d.getMonth()+1) + " " + hm;
    }

    function calcETA(tasks) {
      var p = new Date();
      if (p.getHours() < W0) p.setHours(W0,0,0,0);
      else if (p.getHours() >= W0+WH) { p.setDate(p.getDate()+1); p.setHours(W0,0,0,0); }
      while (p.getDay()===0 || p.getDay()===6) { p.setDate(p.getDate()+1); p.setHours(W0,0,0,0); }
      var s = tasks.filter(function(t){ return t.status!=="concluído"; }).sort(function(a,b){ return a.order-b.order; });
      var r = {};
      s.forEach(function(t) {
        var st = new Date(p), en = addH(new Date(p), t.estimatedHours);
        r[t.id] = { s: st, e: en };
        p = new Date(en);
      });
      return r;
    }

    function I(x) {
      x = x || {};
      var base = { width:"100%", padding:"11px 12px", border:"1.5px solid #C0D8C8",
        borderRadius:8, fontSize:14, outline:"none", background:W, boxSizing:"border-box",
        fontFamily:"inherit", color:"#1A2E22" };
      for (var k in x) base[k] = x[k];
      return base;
    }
    function B(c, x) {
      x = x || {};
      var base = { border:"none", borderRadius:8, cursor:"pointer", fontFamily:"inherit",
        fontWeight:600, color:W, background:c };
      for (var k in x) base[k] = x[k];
      return base;
    }

    function NotConfigured() {
      return e("div", {style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:32,textAlign:"center",background:BG}},
        e("div",{style:{fontSize:48,marginBottom:16}}, "⚙️"),
        e("div",{style:{fontSize:18,fontWeight:700,color:G,marginBottom:10}}, "Configuração pendente"),
        e("div",{style:{fontSize:13,color:"#6A8A75",lineHeight:1.7,maxWidth:320}}, "Verifique as chaves do JSONBin no arquivo.")
      );
    }

    function Login(props) {
      var pinState = useState(""); var pin = pinState[0], setPin = pinState[1];
      var errState = useState(false); var err = errState[0], setErr = errState[1];
      var stored = localStorage.getItem("iris-pin") || "1234";
      function attempt() {
        if (pin === stored) { props.onLogin(); }
        else { setErr(true); setPin(""); setTimeout(function(){ setErr(false); }, 2000); }
      }
      return e("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:32,background:BG}},
        e("div",{style:{width:58,height:58,background:G,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,marginBottom:18}}, "🔑"),
        e("div",{style:{fontSize:18,fontWeight:700,color:G,marginBottom:5}}, "Acesso Admin · Íris"),
        e("div",{style:{fontSize:13,color:"#8AAA95",marginBottom:26,textAlign:"center"}}, "Digite o PIN para gerenciar a fila"),
        e("input",{type:"password", value:pin, onChange:function(ev){setPin(ev.target.value);},
          onKeyDown:function(ev){ if(ev.key==="Enter") attempt(); }, placeholder:"PIN", maxLength:8, autoFocus:true,
          style:I({textAlign:"center",fontSize:22,letterSpacing:8,marginBottom:10,borderColor:err?RED:"#C0D8C8",maxWidth:200,display:"block"})}),
        err ? e("div",{style:{color:RED,fontSize:12,marginBottom:10}}, "PIN incorreto") : null,
        e("button",{onClick:attempt, style:B(G,{padding:"11px 32px",fontSize:14,marginBottom:12,borderRadius:9})}, "Entrar"),
        e("button",{onClick:props.onBack, style:{background:"none",border:"none",color:"#8AAA95",fontSize:13,cursor:"pointer"}}, "← Voltar")
      );
    }

    function Header(props) {
      var isAdmin = props.isAdmin, saving = props.saving, tabs = props.tabs, activeTab = props.activeTab, setActiveTab = props.setActiveTab;
      return e("div",{style:{background:G,padding:"14px 18px 0"}},
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10}},
            e("div",{style:{width:40,height:40,background:"rgba(255,255,255,0.14)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}, "🌿"),
            e("div",null,
              e("div",{style:{color:W,fontWeight:700,fontSize:17,letterSpacing:"-0.3px",display:"flex",alignItems:"center",gap:7}},
                "Íris",
                isAdmin ? e("span",{style:{fontSize:11,fontWeight:500,background:"rgba(255,255,255,0.18)",borderRadius:20,padding:"2px 9px"}}, "Admin") : null
              ),
              e("div",{style:{color:"rgba(255,255,255,0.5)",fontSize:10}}, isAdmin ? "Naturatins · gerenciamento" : "Demandas de comunicação · Naturatins")
            )
          ),
          e("div",{style:{display:"flex",alignItems:"center",gap:8}},
            saving ? e("div",{style:{color:"rgba(255,255,255,0.5)",fontSize:11,animation:"pulse 1.5s infinite"}}, "salvando...") : null,
            isAdmin
              ? e("button",{onClick:props.onLogout, style:B("rgba(255,255,255,0.12)",{fontSize:11,padding:"6px 12px",color:"rgba(255,255,255,0.7)"})}, "Sair")
              : e("button",{onClick:props.onLogin, style:B("rgba(255,255,255,0.1)",{fontSize:11,padding:"6px 12px",color:"rgba(255,255,255,0.55)"})}, "🔑 Admin")
          )
        ),
        e("div",{style:{display:"flex",gap:3}},
          tabs.map(function(tabDef) {
            var id = tabDef[0], ic = tabDef[1], lb = tabDef[2];
            return e("button",{key:id, onClick:function(){setActiveTab(id);}, style:{flex:1,padding:"9px 0",
              background:activeTab===id?BG:"transparent",border:"none",borderRadius:"8px 8px 0 0",cursor:"pointer",
              color:activeTab===id?G:"rgba(255,255,255,0.5)",fontWeight:activeTab===id?700:400,fontSize:12,
              display:"flex",alignItems:"center",justifyContent:"center",gap:5}}, ic + " " + lb);
          })
        )
      );
    }

    function TaskCard(props) {
      var task = props.task, idx = props.idx, total = props.total, eta = props.eta;
      var ev = eta[task.id];
      var compMeta = COMPLEXITY.filter(function(c){return c.label===task.complexity;})[0] || {};
      return e("div",{style:{background:W,borderRadius:12,padding:14,marginBottom:10,
          borderLeft:"4px solid " + (task.status==="em andamento"?AMB:(task.urgente?RED:"#C0D8C8")),
          boxShadow:task.status==="em andamento"?"0 2px 14px rgba(200,138,26,0.15)":"0 1px 5px rgba(0,0,0,0.05)"}},
        e("div",{style:{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}},
          e("div",{style:{width:26,height:26,borderRadius:"50%",background:task.status==="em andamento"?AMB:SAGE,
            color:task.status==="em andamento"?W:G,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,fontWeight:700,flexShrink:0}}, task.status==="em andamento"?"▶":String(idx+1)),
          e("div",{style:{flex:1}},
            e("div",{style:{fontSize:14,fontWeight:600,color:"#1A2E22",lineHeight:1.3}},
              task.urgente ? e("span",{style:{color:RED,fontSize:11}}, "⚡ ") : null, task.title
            ),
            e("div",{style:{fontSize:11,color:"#8AAA95",marginTop:2}}, "por " + task.requester + " · " + task.category)
          ),
          e("div",{style:{textAlign:"right",flexShrink:0}},
            e("div",{style:{fontSize:14,fontWeight:700,color:G}}, "~" + task.estimatedHours + "h"),
            e("div",{style:{fontSize:9,color:"#BBB"}}, "estimado")
          )
        ),
        ev ? e("div",{style:{background:"#F3F9F4",borderRadius:8,padding:"8px 12px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("div",null, e("div",{style:{fontSize:10,color:"#8AAA95"}}, "Início"), e("div",{style:{fontSize:12,fontWeight:600,color:"#3A6A4A"}}, fmt(ev.s))),
          e("div",{style:{color:"#C0D8C8",fontSize:18}}, "→"),
          e("div",{style:{textAlign:"right"}}, e("div",{style:{fontSize:10,color:"#8AAA95"}}, "Conclusão"), e("div",{style:{fontSize:12,fontWeight:600,color:G}}, fmt(ev.e)))
        ) : null,
        task.notes ? e("div",{style:{fontSize:12,color:"#4A6A55",background:"#F3F9F4",borderRadius:6,padding:"7px 10px",marginBottom:8}}, "📝 " + task.notes) : null,
        e("div",{style:{fontSize:11,color:"#8AAA95",marginBottom:10}}, (compMeta.emoji||"") + " " + task.complexity),
        e("div",{style:{display:"flex",gap:6}},
          task.status==="pendente" ? e("button",{onClick:function(){props.onStatus(task.id,"em andamento");}, style:B(AMB,{flex:1,padding:"9px 0",fontSize:12})}, "▶ Iniciar") : null,
          task.status==="em andamento" ? e("button",{onClick:function(){props.onStatus(task.id,"concluído");}, style:B(GRN,{flex:1,padding:"9px 0",fontSize:12})}, "✓ Concluir") : null,
          e("button",{onClick:function(){props.onMove(task.id,"up");}, disabled:idx===0,
            style:{width:36,padding:"9px 0",background:idx===0?"#EFF5F1":SAGE,color:idx===0?"#C0D8C8":G,border:"none",borderRadius:7,fontSize:14,cursor:idx===0?"default":"pointer"}}, "↑"),
          e("button",{onClick:function(){props.onMove(task.id,"down");}, disabled:idx===total-1,
            style:{width:36,padding:"9px 0",background:idx===total-1?"#EFF5F1":SAGE,color:idx===total-1?"#C0D8C8":G,border:"none",borderRadius:7,fontSize:14,cursor:idx===total-1?"default":"pointer"}}, "↓"),
          e("button",{onClick:function(){props.onDel(task.id);}, style:{width:36,padding:"9px 0",background:"#FEF0EF",color:RED,border:"none",borderRadius:7,fontSize:16,cursor:"pointer"}}, "×")
        )
      );
    }

    function Iris() {
      var modeState = useState("public"); var mode = modeState[0], setMode = modeState[1];
      var tasksState = useState([]); var tasks = tasksState[0], setTasks = tasksState[1];
      var loadingState = useState(true); var loading = loadingState[0], setLoading = loadingState[1];
      var savingState = useState(false); var saving = savingState[0], setSaving = savingState[1];
      var loadErrState = useState(false); var loadErr = loadErrState[0], setLoadErr = loadErrState[1];
      var tabState = useState("request"); var tab = tabState[0], setTab = tabState[1];
      var atabState = useState("queue"); var atab = atabState[0], setAtab = atabState[1];
      var formState = useState({requester:"",title:"",category:"Card/Post",complexity:0,notes:"",urgente:false});
      var form = formState[0], setForm = formState[1];
      var sentState = useState(false); var sent = sentState[0], setSent = sentState[1];
      var myIdState = useState(null); var myId = myIdState[0], setMyId = myIdState[1];
      var newPinState = useState(""); var newPin = newPinState[0], setNewPin = newPinState[1];
      var pinSavedState = useState(false); var pinSaved = pinSavedState[0], setPinSaved = pinSavedState[1];

      var refresh = useCallback(function(silent) {
        if (!silent) setLoadErr(false);
        API.load().then(function(t){ setTasks(t); setLoading(false); })
          .catch(function(){ if(!silent) setLoadErr(true); setLoading(false); });
      }, []);

      useEffect(function() {
        refresh(false);
        var id = setInterval(function(){ refresh(true); }, 120000);
        return function(){ clearInterval(id); };
      }, [refresh]);

      function saveT(updated) {
        setSaving(true);
        API.save(updated).then(function(){ setTasks(updated); setSaving(false); })
          .catch(function(){ alert("Erro ao salvar. Verifique sua conexão."); setSaving(false); });
      }

      function submitReq() {
        if (!form.title.trim() || !form.requester.trim()) return;
        setSaving(true);
        API.load().then(function(current) {
          var opt = COMPLEXITY[form.complexity];
          var t = { id:Date.now(), requester:form.requester, title:form.title, category:form.category,
            complexity:opt.label, estimatedHours:opt.hours, notes:form.notes, urgente:form.urgente,
            status:"pendente", order:0, submittedAt:new Date().toISOString() };
          var u;
          if (form.urgente) {
            var ac = current.filter(function(x){return x.status==="em andamento";});
            var pe = current.filter(function(x){return x.status==="pendente";});
            var dn = current.filter(function(x){return x.status==="concluído";});
            u = ac.concat([t]).concat(pe).concat(dn);
          } else { u = current.concat([t]); }
          u = u.map(function(x,i){ var c = {}; for(var k in x) c[k]=x[k]; c.order=i; return c; });
          return API.save(u).then(function(){
            setTasks(u); setMyId(t.id);
            setForm({requester:"",title:"",category:"Card/Post",complexity:0,notes:"",urgente:false});
            setSent(true); setSaving(false);
          });
        }).catch(function(){ alert("Erro ao enviar. Tente de novo."); setSaving(false); });
      }

      function setStatus(id, st) {
        var u = tasks.map(function(t){ if(t.id!==id) return t; var c={}; for(var k in t) c[k]=t[k]; c.status=st; return c; });
        saveT(u);
      }
      function del(id) {
        if (!confirm("Remover esta demanda?")) return;
        var u = tasks.filter(function(t){return t.id!==id;}).map(function(t,i){ var c={}; for(var k in t) c[k]=t[k]; c.order=i; return c; });
        saveT(u);
      }
      function move(id, dir) {
        var pe = tasks.filter(function(t){return t.status!=="concluído";}).sort(function(a,b){return a.order-b.order;});
        var dn = tasks.filter(function(t){return t.status==="concluído";});
        var idx = -1;
        for (var i=0;i<pe.length;i++) if (pe[i].id===id) { idx=i; break; }
        if (idx===-1) return;
        if (dir==="up" && idx===0) return;
        if (dir==="down" && idx===pe.length-1) return;
        var sw = dir==="up" ? idx-1 : idx+1;
        var tmp = pe[idx]; pe[idx]=pe[sw]; pe[sw]=tmp;
        saveT(pe.concat(dn).map(function(t,i){ var c={}; for(var k in t) c[k]=t[k]; c.order=i; return c; }));
      }
      function savePin() {
        if (newPin.length<4) return;
        localStorage.setItem("iris-pin", newPin);
        setNewPin(""); setPinSaved(true); setTimeout(function(){setPinSaved(false);},2500);
      }

      var eta = calcETA(tasks);
      var pending = tasks.filter(function(t){return t.status!=="concluído";}).sort(function(a,b){return a.order-b.order;});
      var dones = tasks.filter(function(t){return t.status==="concluído";});
      var totalH = pending.reduce(function(s,t){return s+t.estimatedHours;},0);
      var lastEnd = pending.length>0 ? (eta[pending[pending.length-1].id]||{}).e : null;
      var myReq = myId ? tasks.filter(function(t){return t.id===myId;})[0] : null;
      var myPos = -1;
      if (myReq) { for (var i=0;i<pending.length;i++) if (pending[i].id===myId) { myPos=i+1; break; } }
      var myEta = myReq ? eta[myId] : null;

      function SummaryBar() {
        var items = [
          {v:pending.length||"0", l:"na fila", c:G},
          {v:totalH+"h", l:"estimado", c:"#666"},
          {v:lastEnd?fmt(lastEnd):"Livre", l:"livre em", c:AMB}
        ];
        return e("div",{style:{background:W,borderRadius:10,padding:"12px 0",marginBottom:16,display:"flex",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
          items.map(function(x,i){
            return e("div",{key:i, style:{flex:1,textAlign:"center",borderRight:i<2?"1px solid #E8EDE8":"none"}},
              e("div",{style:{fontSize:i===2?11:18,fontWeight:700,color:x.c,lineHeight:1.2}}, x.v),
              e("div",{style:{fontSize:10,color:"#AAA",marginTop:1}}, x.l)
            );
          })
        );
      }

      if (!ready()) return e(NotConfigured);
      if (mode==="login") return e(Login, {onLogin:function(){setMode("admin");}, onBack:function(){setMode("public");}});

      if (mode==="admin") {
        return e("div",{style:{fontFamily:"inherit",background:BG,minHeight:"100vh",maxWidth:500,margin:"0 auto",display:"flex",flexDirection:"column"}},
          e(Header,{isAdmin:true, saving:saving, onLogout:function(){setMode("public");},
            tabs:[["queue","📋","Fila"],["settings","⚙️","Config"]], activeTab:atab, setActiveTab:setAtab}),
          atab==="queue" ? e("div",{style:{flex:1,overflowY:"auto",padding:16}},
            e("button",{onClick:function(){refresh(false);}, style:B(G,{width:"100%",padding:10,fontSize:13,marginBottom:14,borderRadius:9,opacity:(saving||loading)?0.6:1})}, loading?"⏳ Carregando...":"🔄 Atualizar fila"),
            loadErr ? e("div",{style:{background:"#FEF0EF",borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:RED,textAlign:"center"}}, "⚠️ Erro ao carregar. Verifique a conexão.") : null,
            (!loading && pending.length===0)
              ? e("div",{style:{textAlign:"center",padding:"50px 20px",color:"#8AAA95"}},
                  e("div",{style:{fontSize:44,marginBottom:12}}, "🌱"),
                  e("div",{style:{fontSize:15,fontWeight:600,color:"#4A7A5A",marginBottom:7}}, "Fila vazia!"),
                  e("div",{style:{fontSize:13}}, "Nenhuma demanda pendente.")
                )
              : e(React.Fragment, null,
                  e(SummaryBar),
                  pending.map(function(task,idx){ return e(TaskCard,{key:task.id, task:task, idx:idx, total:pending.length, eta:eta, onStatus:setStatus, onMove:move, onDel:del}); }),
                  dones.length>0 ? e("div",{style:{marginTop:20}},
                    e("div",{style:{fontSize:11,fontWeight:700,color:GRN,textTransform:"uppercase",letterSpacing:"0.9px",marginBottom:8,display:"flex",alignItems:"center",gap:6}},
                      e("div",{style:{width:7,height:7,borderRadius:"50%",background:GRN}}), "Concluídas · " + dones.length
                    ),
                    dones.map(function(task){
                      return e("div",{key:task.id, style:{background:W,borderRadius:10,padding:"10px 14px",marginBottom:7,opacity:0.4,borderLeft:"4px solid "+GRN,display:"flex",alignItems:"center",justifyContent:"space-between"}},
                        e("div",null,
                          e("div",{style:{fontSize:13,fontWeight:500,color:"#3A5A45",textDecoration:"line-through"}}, task.title),
                          e("div",{style:{fontSize:11,color:"#8AAA95"}}, "por " + task.requester)
                        ),
